<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastTrack — Project Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ece4;
    --border: #e2ddd4;
    --text: #1a1714;
    --text-muted: #8a8278;
    --accent: #f0197d;
    --accent-light: #fde6f2;
    --accent2: #4a7c6b;
    --accent2-light: #ddf0ea;
    --shadow: 0 2px 12px rgba(26,23,20,0.08);
    --shadow-lg: 0 8px 32px rgba(26,23,20,0.14);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    padding: 0 32px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }

  .header-actions { display: flex; align-items: center; gap: 8px; }

  /* PROJECT TABS */
  .tabs-bar {
    display: flex;
    align-items: stretch;
    padding: 0 32px;
    overflow-x: auto;
    scrollbar-width: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    min-height: 38px;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }

  .project-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    font-size: 12.5px;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    border-bottom: 2.5px solid transparent;
    transition: all 0.15s;
    max-width: 180px;
    min-width: 0;
  }
  .project-tab:hover { color: var(--text); background: rgba(0,0,0,0.03); }
  .project-tab.active {
    color: var(--text);
    font-weight: 500;
    border-bottom-color: var(--accent);
    background: var(--surface);
  }

  .tab-name { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }

  .tab-close {
    width: 15px; height: 15px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-muted);
    opacity: 0.3; transition: all 0.12s; flex-shrink: 0;
    background: transparent; border: none; cursor: pointer; font-family: inherit;
  }
  .project-tab:hover .tab-close { opacity: 1; }
  .project-tab.active .tab-close { opacity: 0.5; }
  .project-tab.active .tab-close:hover { opacity: 1; background: var(--border); }

  .tab-add-btn {
    padding: 0 14px;
    font-size: 20px; line-height: 1;
    color: var(--text-muted);
    cursor: pointer; border: none; background: transparent;
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center;
    transition: color 0.12s; flex-shrink: 0;
  }
  .tab-add-btn:hover { color: var(--accent); }

  /* BUTTONS */
  .btn {
    padding: 7px 14px; border-radius: var(--radius-sm); border: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s ease;
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #d0146b; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  /* MAIN */
  main { padding: 22px 32px; max-width: 1600px; margin: 0 auto; }

  /* PROJECT HEADER */
  .project-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 20px; gap: 20px; flex-wrap: wrap;
  }

  .project-title-area h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 29px; letter-spacing: -0.03em;
    color: var(--text); line-height: 1; margin-bottom: 4px;
    cursor: text; outline: none;
    border-bottom: 2px solid transparent; transition: border-color 0.15s;
  }
  .project-title-area h1:focus { border-bottom-color: var(--accent); }
  .project-subtitle { font-size: 12px; color: var(--text-muted); }

  .stats-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .stat-pill {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 4px 11px; font-size: 11px; font-weight: 500;
    color: var(--text-muted); display: flex; align-items: center; gap: 4px;
  }
  .stat-pill .count { font-weight: 600; color: var(--text); }

  /* VIEW CONTROLS */
  .view-controls {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-wrap: wrap;
  }

  .view-tabs {
    display: flex; background: var(--surface2);
    border-radius: var(--radius-sm); padding: 3px; gap: 2px;
  }
  .view-tab {
    padding: 5px 13px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .view-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

  .zoom-controls { display: flex; gap: 3px; }
  .zoom-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1.5px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 14px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; transition: all 0.12s;
  }
  .zoom-btn:hover { background: var(--surface2); color: var(--text); }

  .today-btn {
    padding: 5px 11px; border-radius: 6px;
    border: 1.5px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 12px; font-weight: 500; color: var(--accent);
    font-family: 'DM Sans', sans-serif; transition: all 0.12s;
  }
  .today-btn:hover { background: var(--accent-light); border-color: var(--accent); }

  /* GANTT */
  .gantt-wrapper {
    background: var(--surface); border-radius: var(--radius);
    border: 1.5px solid var(--border); overflow: hidden;
    box-shadow: var(--shadow); animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .gantt-container { display: flex; overflow: hidden; }

  .gantt-left {
    width: 260px; flex-shrink: 0;
    border-right: 1.5px solid var(--border);
    background: var(--surface); z-index: 10;
  }

  .gantt-header-left {
    height: 50px; border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; background: var(--surface2);
  }
  .gantt-header-left span {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
  }

  .gantt-tasks { overflow-y: hidden; }

  .task-row {
    height: 50px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 10px 0 16px;
    gap: 8px; cursor: pointer; transition: background 0.12s;
  }
  .task-row:hover { background: var(--surface2); }
  .task-row.selected { background: var(--accent-light); }

  .task-color-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  .task-name-text {
    font-size: 13px; font-weight: 400; color: var(--text);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: text;
  }
  .task-name-text[contenteditable]:focus {
    outline: none; background: var(--surface); border-radius: 4px; padding: 0 4px;
  }

  .task-actions { opacity: 0; display: flex; gap: 2px; transition: opacity 0.12s; }
  .task-row:hover .task-actions { opacity: 1; }

  .task-action-btn {
    width: 20px; height: 20px; border: none; background: transparent;
    cursor: pointer; border-radius: 4px; font-size: 10px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; transition: all 0.12s;
  }
  .task-action-btn:hover { background: var(--border); color: var(--text); }
  .task-action-btn.delete:hover { background: #fde8e8; color: #c0392b; }

  .add-task-row {
    height: 40px; display: flex; align-items: center; padding: 0 16px;
    cursor: pointer; transition: background 0.12s; border-top: 1px dashed var(--border);
  }
  .add-task-row:hover { background: var(--surface2); }
  .add-task-row span { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .add-task-row span:hover { color: var(--accent); }

  .gantt-right { flex: 1; overflow: auto; position: relative; max-height: calc(100vh - 268px); }
  .gantt-timeline { min-width: 100%; position: relative; display: flex; flex-direction: column; }

  .gantt-header-right {
    height: 50px; border-bottom: 1.5px solid var(--border);
    background: var(--surface2); display: flex; align-items: flex-end;
    position: sticky; top: 0; z-index: 5; flex-shrink: 0;
  }

  .month-label {
    position: absolute; top: 7px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); pointer-events: none;
  }

  .day-labels { display: flex; align-items: flex-end; height: 100%; padding-bottom: 7px; }
  .day-label { font-size: 10px; color: var(--text-muted); text-align: center; font-weight: 400; flex-shrink: 0; }
  .day-label.today-label { color: var(--accent); font-weight: 700; }

  .gantt-body { position: relative; }
  .gantt-body-inner { position: relative; }

  .gantt-row {
    height: 50px; border-bottom: 1px solid var(--border);
    position: relative; display: flex; align-items: center;
  }
  .gantt-row:hover .gantt-row-bg { opacity: 1; }
  .gantt-row-bg {
    position: absolute; inset: 0; background: var(--surface2);
    opacity: 0; transition: opacity 0.12s; pointer-events: none;
  }

  .day-cell { height: 100%; border-right: 1px solid var(--border); flex-shrink: 0; }
  .day-cell.weekend { background: rgba(0,0,0,0.015); }
  .day-cell.today-col { background: rgba(240,25,125,0.05); }

  .today-line {
    position: absolute; top: 0; width: 2px;
    background: var(--accent); z-index: 4; pointer-events: none;
  }
  .today-line::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 7px; height: 7px; background: var(--accent); border-radius: 50%;
  }

  /* TASK BARS */
  .task-bar {
    position: absolute; height: 26px; border-radius: 6px;
    top: 50%; transform: translateY(-50%);
    cursor: pointer; transition: filter 0.12s, transform 0.12s;
    display: flex; align-items: center; overflow: hidden;
    z-index: 3; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .task-bar:hover { filter: brightness(1.06); box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 10; margin-top: -1px; }
  .task-bar.selected { outline: 2.5px solid var(--text); outline-offset: 1px; }

  .task-bar-label {
    font-size: 11px; font-weight: 500; color: white;
    padding: 0 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2); pointer-events: none;
  }

  .task-bar-progress {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: rgba(255,255,255,0.2); pointer-events: none; border-radius: 6px 0 0 6px;
  }

  .drag-handle {
    position: absolute; top: 0; bottom: 0; width: 6px;
    cursor: ew-resize; opacity: 0; transition: opacity 0.12s; z-index: 5;
  }
  .task-bar:hover .drag-handle { opacity: 1; }
  .drag-handle-left { left: 0; border-radius: 6px 0 0 6px; background: rgba(0,0,0,0.2); }
  .drag-handle-right { right: 0; border-radius: 0 6px 6px 0; background: rgba(0,0,0,0.2); }

  /* DETAIL PANEL */
  .detail-panel {
    position: fixed; right: -400px; top: 0; bottom: 0; width: 360px;
    background: var(--surface); border-left: 1.5px solid var(--border);
    box-shadow: -8px 0 32px rgba(0,0,0,0.1); z-index: 200;
    transition: right 0.25s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .detail-panel.open { right: 0; }

  .detail-header {
    padding: 18px 22px; border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .detail-header h3 { font-family: 'Instrument Serif', serif; font-size: 17px; letter-spacing: -0.02em; }

  .close-btn {
    width: 30px; height: 30px; border: none; background: var(--surface2);
    border-radius: 7px; cursor: pointer; font-size: 14px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; transition: all 0.12s;
  }
  .close-btn:hover { background: var(--border); color: var(--text); }

  .detail-body { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

  .detail-field label {
    display: block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 5px;
  }

  .detail-input {
    width: 100%; padding: 9px 11px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text); background: var(--bg);
    transition: border-color 0.12s; outline: none;
  }
  .detail-input:focus { border-color: var(--accent); background: white; }

  .detail-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .color-picker { display: flex; gap: 7px; flex-wrap: wrap; }
  .color-swatch {
    width: 26px; height: 26px; border-radius: 6px;
    cursor: pointer; border: 2px solid transparent; transition: all 0.12s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: var(--text); }

  .detail-footer { padding: 14px 20px; border-top: 1.5px solid var(--border); display: flex; gap: 8px; }

  /* EMPTY STATE */
  .empty-state { padding: 52px 20px; text-align: center; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state h3 { font-family: 'Instrument Serif', serif; font-size: 19px; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; max-width: 240px; margin: 0 auto 16px; }

  /* MODALS */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,23,20,0.4);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border-radius: var(--radius);
    padding: 26px; width: 420px; max-width: 92vw;
    box-shadow: var(--shadow-lg); transform: translateY(12px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 { font-family: 'Instrument Serif', serif; font-size: 20px; letter-spacing: -0.02em; margin-bottom: 18px; }

  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 5px;
  }

  .modal-input {
    width: 100%; padding: 9px 11px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text); background: var(--bg);
    transition: border-color 0.12s; outline: none;
  }
  .modal-input:focus { border-color: var(--accent); background: white; }

  .modal-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* LIST VIEW */
  .list-view {
    display: none; background: var(--surface); border-radius: var(--radius);
    border: 1.5px solid var(--border); overflow: hidden; box-shadow: var(--shadow);
  }
  .list-view.active { display: block; }
  .gantt-wrapper.list-hidden { display: none; }

  .list-header {
    display: grid; grid-template-columns: 3fr 1.5fr 1.5fr 1fr 80px;
    background: var(--surface2); border-bottom: 1.5px solid var(--border);
    padding: 0 20px; height: 40px; align-items: center;
  }
  .list-col-head {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
  }

  .list-task-row {
    display: grid; grid-template-columns: 3fr 1.5fr 1.5fr 1fr 80px;
    padding: 0 20px; height: 52px; align-items: center;
    border-bottom: 1px solid var(--border); transition: background 0.12s; cursor: pointer;
  }
  .list-task-row:hover { background: var(--surface2); }
  .list-task-row:last-child { border-bottom: none; }
  .list-task-name { display: flex; align-items: center; gap: 9px; font-size: 13px; }
  .list-task-date { font-size: 12px; color: var(--text-muted); }
  .list-task-progress { display: flex; align-items: center; gap: 7px; }
  .list-progress-bar { width: 52px; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .list-progress-fill { height: 100%; border-radius: 3px; }
  .status-badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }

  /* CONFIRM text */
  .confirm-msg { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .confirm-project-name { font-weight: 600; color: var(--text); }

  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* TOOLTIP */
  .tooltip {
    position: fixed; background: var(--text); color: white;
    padding: 5px 9px; border-radius: 6px; font-size: 11px; font-weight: 500;
    pointer-events: none; z-index: 500; opacity: 0; transition: opacity 0.1s; white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }

  @media (max-width: 768px) {
    main { padding: 14px; }
    .header-top, .tabs-bar { padding: 0 14px; }
    .gantt-left { width: 170px; }
    .detail-panel { width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo"><div class="logo-dot"></div> FastTrack</div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="exportData()">↓ Export</button>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Task</button>
    </div>
  </div>
  <div class="tabs-bar" id="tabsBar"></div>
</header>

<main>
  <div class="project-header">
    <div class="project-title-area">
      <h1 contenteditable="true" id="projectTitle" onblur="renameCurrentProject(this.textContent)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">My Project</h1>
      <div class="project-subtitle">Click title to rename · Drag bars to reschedule</div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>

  <div class="view-controls">
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('gantt',this)">Gantt</button>
      <button class="view-tab" onclick="setView('list',this)">List</button>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="changeZoom(-4)" title="Zoom out">−</button>
      <button class="zoom-btn" onclick="changeZoom(4)" title="Zoom in">+</button>
    </div>
    <button class="today-btn" onclick="scrollToToday()">Today</button>
  </div>

  <div class="gantt-wrapper" id="ganttWrapper">
    <div class="gantt-container">
      <div class="gantt-left">
        <div class="gantt-header-left"><span>Task</span></div>
        <div class="gantt-tasks" id="taskList"></div>
        <div class="add-task-row" onclick="openAddModal()"><span>＋ Add task</span></div>
      </div>
      <div class="gantt-right" id="ganttRight">
        <div class="gantt-timeline">
          <div class="gantt-header-right" id="ganttHeader"></div>
          <div class="gantt-body" id="ganttBody">
            <div class="gantt-body-inner" id="ganttBodyInner"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="list-view" id="listView">
    <div class="list-header">
      <div class="list-col-head">Task</div>
      <div class="list-col-head">Start</div>
      <div class="list-col-head">End</div>
      <div class="list-col-head">Progress</div>
      <div class="list-col-head">Status</div>
    </div>
    <div id="listBody"></div>
  </div>
</main>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <h3>Task Details</h3>
    <button class="close-btn" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body">
    <div class="detail-field">
      <label>Task Name</label>
      <input type="text" class="detail-input" id="detailName" oninput="updateSelectedTask()">
    </div>
    <div class="detail-dates">
      <div class="detail-field"><label>Start Date</label><input type="date" class="detail-input" id="detailStart" onchange="updateSelectedTask()"></div>
      <div class="detail-field"><label>End Date</label><input type="date" class="detail-input" id="detailEnd" onchange="updateSelectedTask()"></div>
    </div>
    <div class="detail-field">
      <label>Progress — <span id="progressLabel">0%</span></label>
      <input type="range" min="0" max="100" value="0" id="detailProgress"
             style="width:100%;accent-color:var(--accent);margin-top:8px;" oninput="updateProgress(this.value)">
    </div>
    <div class="detail-field">
      <label>Notes</label>
      <textarea class="detail-input" id="detailNotes" rows="4" style="resize:vertical;" oninput="updateSelectedTask()"></textarea>
    </div>
    <div class="detail-field">
      <label>Color</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
  </div>
  <div class="detail-footer">
    <button class="btn btn-ghost" style="flex:1;color:#c0392b;border-color:#f5c6c6;" onclick="deleteSelectedTask()">Delete Task</button>
    <button class="btn btn-primary" style="flex:2;" onclick="closeDetail()">Done</button>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>New Task</h2>
    <div class="modal-field"><label>Task Name</label><input type="text" class="modal-input" id="newTaskName" placeholder="e.g. Design wireframes"></div>
    <div class="modal-dates">
      <div class="modal-field" style="margin:0"><label>Start Date</label><input type="date" class="modal-input" id="newTaskStart"></div>
      <div class="modal-field" style="margin:0"><label>End Date</label><input type="date" class="modal-input" id="newTaskEnd"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>New Project</h2>
    <div class="modal-field"><label>Project Name</label><input type="text" class="modal-input" id="newProjectName" placeholder="e.g. Website Redesign"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('newProjectModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Delete Project?</h2>
    <p class="confirm-msg" style="margin-bottom:6px">
      This will permanently delete <span class="confirm-project-name" id="confirmProjectName"></span> and all its tasks. This can't be undone.
    </p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn btn-primary" style="background:#c0392b;" onclick="confirmDeleteProject()">Delete</button>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ===== STATE =====
const COLORS = [
  {name:'Rust',   bg:'#c85c2a'}, {name:'Forest', bg:'#4a7c6b'},
  {name:'Violet', bg:'#7c5a9b'}, {name:'Gold',   bg:'#b8962e'},
  {name:'Cobalt', bg:'#3a6fa8'}, {name:'Rose',   bg:'#b05070'},
  {name:'Slate',  bg:'#4a5568'}, {name:'Teal',   bg:'#2d8a8a'},
];

let state = loadState();
let selectedTaskId = null;
let cellWidth = 28;
let viewStartDate = null;
let viewDays = 90;
let currentView = 'gantt';
let pendingDeleteProjectId = null;

// ===== PERSISTENCE =====
function loadState() {
  try {
    const raw = localStorage.getItem('flowState_v2');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const proj = makeProject('My Project');
  proj.tasks = sampleTasks();
  return { projects: [proj], activeProjectId: proj.id };
}

function saveState() { localStorage.setItem('flowState_v2', JSON.stringify(state)); }

function makeProject(name) {
  return { id: uid(), name: name || 'New Project', tasks: [] };
}

function sampleTasks() {
  const d = n => { const dt = new Date(); dt.setDate(dt.getDate()+n); return toDateStr(dt); };
  return [
    {id:uid(), name:'Research & Discovery',  start:d(-20), end:d(-10), color:COLORS[4].bg, progress:100, notes:''},
    {id:uid(), name:'Wireframing',            start:d(-12), end:d(-4),  color:COLORS[0].bg, progress:80,  notes:''},
    {id:uid(), name:'Visual Design',          start:d(-6),  end:d(6),   color:COLORS[2].bg, progress:45,  notes:''},
    {id:uid(), name:'Development Sprint 1',   start:d(-2),  end:d(12),  color:COLORS[1].bg, progress:20,  notes:''},
    {id:uid(), name:'User Testing',           start:d(10),  end:d(18),  color:COLORS[3].bg, progress:0,   notes:''},
    {id:uid(), name:'Launch Prep',            start:d(16),  end:d(24),  color:COLORS[5].bg, progress:0,   notes:''},
  ];
}

function getActiveProject() {
  return state.projects.find(p => p.id === state.activeProjectId) || state.projects[0];
}
function getTasks() { return getActiveProject()?.tasks || []; }

// ===== INIT =====
function init() {
  const today = new Date();
  viewStartDate = new Date(today);
  viewStartDate.setDate(today.getDate() - 14);
  setupColorPicker();
  renderTabs();
  render();
  setTimeout(scrollToToday, 100);
}

// ===== TABS =====
function renderTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = state.projects.map(p => `
    <div class="project-tab ${p.id === state.activeProjectId ? 'active' : ''}" onclick="switchProject('${p.id}')">
      <span class="tab-name">${escHtml(p.name)}</span>
      <button class="tab-close" onclick="event.stopPropagation();askDeleteProject('${p.id}')" title="Delete project">✕</button>
    </div>
  `).join('') + `<button class="tab-add-btn" onclick="openNewProjectModal()" title="New project">＋</button>`;
}

function switchProject(id) {
  if (state.activeProjectId === id) return;
  closeDetail();
  state.activeProjectId = id;
  saveState();
  renderTabs();
  render();
  setTimeout(scrollToToday, 80);
}

function openNewProjectModal() {
  document.getElementById('newProjectName').value = '';
  document.getElementById('newProjectModal').classList.add('open');
  setTimeout(() => document.getElementById('newProjectName').focus(), 80);
}

function createProject() {
  const name = document.getElementById('newProjectName').value.trim() || 'New Project';
  const proj = makeProject(name);
  state.projects.push(proj);
  state.activeProjectId = proj.id;
  saveState();
  closeModal('newProjectModal');
  renderTabs();
  render();
  setTimeout(scrollToToday, 80);
}

function askDeleteProject(id) {
  if (state.projects.length === 1) { alert('You need at least one project.'); return; }
  pendingDeleteProjectId = id;
  const proj = state.projects.find(p => p.id === id);
  document.getElementById('confirmProjectName').textContent = '"' + (proj?.name || '') + '"';
  document.getElementById('confirmModal').classList.add('open');
}

function confirmDeleteProject() {
  if (!pendingDeleteProjectId) return;
  const idx = state.projects.findIndex(p => p.id === pendingDeleteProjectId);
  state.projects.splice(idx, 1);
  if (state.activeProjectId === pendingDeleteProjectId)
    state.activeProjectId = state.projects[Math.max(0, idx-1)].id;
  pendingDeleteProjectId = null;
  closeModal('confirmModal');
  closeDetail();
  saveState();
  renderTabs();
  render();
}

function renameCurrentProject(name) {
  const proj = getActiveProject();
  if (proj) { proj.name = name.trim() || 'Untitled'; saveState(); renderTabs(); }
}

// ===== RENDER =====
function render() {
  const proj = getActiveProject();
  const titleEl = document.getElementById('projectTitle');
  // Only update if not focused to avoid cursor jump
  if (document.activeElement !== titleEl)
    titleEl.textContent = proj ? proj.name : '';
  renderStats();
  if (currentView === 'gantt') renderGantt();
  else renderList();
}

function renderStats() {
  const tasks = getTasks();
  const done = tasks.filter(t => t.progress === 100).length;
  const inp  = tasks.filter(t => t.progress > 0 && t.progress < 100).length;
  const ns   = tasks.filter(t => t.progress === 0).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill"><span class="count">${tasks.length}</span> tasks</div>
    <div class="stat-pill" style="color:var(--accent2);border-color:var(--accent2-light)"><span class="count" style="color:var(--accent2)">${done}</span> done</div>
    <div class="stat-pill" style="color:var(--accent);border-color:var(--accent-light)"><span class="count" style="color:var(--accent)">${inp}</span> in progress</div>
    <div class="stat-pill"><span class="count">${ns}</span> not started</div>
  `;
}

function renderGantt() { renderTaskList(); renderTimeline(); renderBars(); }

function renderTaskList() {
  const tasks = getTasks();
  const container = document.getElementById('taskList');
  if (!tasks.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>No tasks yet</h3><p>Add your first task to get started.</p></div>`;
    return;
  }
  container.innerHTML = tasks.map(task => `
    <div class="task-row ${selectedTaskId===task.id?'selected':''}" id="taskrow-${task.id}" onclick="selectTask('${task.id}')">
      <div class="task-color-dot" style="background:${task.color}"></div>
      <span class="task-name-text" onclick="event.stopPropagation()" contenteditable="true"
            onblur="renameTask('${task.id}',this.textContent)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${escHtml(task.name)}</span>
      <div class="task-actions">
        <button class="task-action-btn delete" onclick="event.stopPropagation();deleteTask('${task.id}')" title="Delete">✕</button>
      </div>
    </div>`).join('');
}

function renderTimeline() {
  const tasks = getTasks();
  const header = document.getElementById('ganttHeader');
  const bodyInner = document.getElementById('ganttBodyInner');
  const totalWidth = viewDays * cellWidth;
  const today = new Date(); today.setHours(0,0,0,0);

  let headerHtml = '<div class="day-labels">';
  let monthLabels = {};
  for (let i = 0; i < viewDays; i++) {
    const d = new Date(viewStartDate); d.setDate(viewStartDate.getDate()+i);
    const isToday = d.getTime()===today.getTime();
    const dayNum = d.getDate();
    const mk = d.getFullYear()+'-'+d.getMonth();
    if (!monthLabels[mk]) monthLabels[mk] = {left:i*cellWidth, label:d.toLocaleDateString('en-US',{month:'short',year:'numeric'})};
    const show = dayNum % Math.max(1, Math.floor(20/cellWidth))===0 || dayNum===1 || i===0;
    headerHtml += `<div class="day-label ${isToday?'today-label':''}" style="width:${cellWidth}px;opacity:${show?1:0}">${dayNum}</div>`;
  }
  headerHtml += '</div>';
  let monthHtml = Object.values(monthLabels).map(m=>`<div class="month-label" style="left:${m.left+4}px">${m.label}</div>`).join('');
  header.innerHTML = monthHtml + headerHtml;
  header.style.width = totalWidth+'px';

  const todayOffset = Math.floor((today-viewStartDate)/86400000);
  let gridHtml = '';
  tasks.forEach(task => {
    gridHtml += `<div class="gantt-row" id="ganttrow-${task.id}" style="width:${totalWidth}px"><div class="gantt-row-bg"></div>`;
    for (let j = 0; j < viewDays; j++) {
      const d = new Date(viewStartDate); d.setDate(viewStartDate.getDate()+j);
      const isWeekend = d.getDay()===0||d.getDay()===6;
      gridHtml += `<div class="day-cell ${isWeekend?'weekend':''} ${j===todayOffset?'today-col':''}" style="width:${cellWidth}px"></div>`;
    }
    gridHtml += '</div>';
  });
  const lineHeight = tasks.length * 50;
  if (todayOffset>=0 && todayOffset<viewDays)
    gridHtml += `<div class="today-line" style="left:${todayOffset*cellWidth+cellWidth/2}px;height:${lineHeight}px"></div>`;
  bodyInner.innerHTML = gridHtml;
  bodyInner.style.width = totalWidth+'px';

  const ganttRight = document.getElementById('ganttRight');
  const taskList = document.getElementById('taskList');
  let syncingScroll = false;
  ganttRight.onscroll = () => {
    if (syncingScroll) return; syncingScroll = true;
    taskList.scrollTop = ganttRight.scrollTop;
    syncingScroll = false;
  };
  taskList.onscroll = () => {
    if (syncingScroll) return; syncingScroll = true;
    ganttRight.scrollTop = taskList.scrollTop;
    syncingScroll = false;
  };
}

function renderBars() {
  document.querySelectorAll('.task-bar').forEach(b => b.remove());
  const container = document.getElementById('ganttBodyInner');
  const ROW_H = 50;
  getTasks().forEach((task, i) => {
    const s = Math.floor((new Date(task.start+'T00:00:00')-viewStartDate)/86400000);
    const e = Math.floor((new Date(task.end  +'T00:00:00')-viewStartDate)/86400000);
    const w = (e-s+1)*cellWidth-4;
    if (w < 2) return;
    const bar = document.createElement('div');
    bar.className = 'task-bar'+(selectedTaskId===task.id?' selected':'');
    bar.id = 'bar-'+task.id;
    const topPx = i * ROW_H + (ROW_H - 26) / 2;
    bar.style.cssText = 'left:'+(s*cellWidth+2)+'px;width:'+Math.max(w,10)+'px;background:'+task.color+';top:'+topPx+'px;transform:none;';
    bar.innerHTML =
      '<div class="task-bar-progress" style="width:'+task.progress+'%"></div>' +
      '<div class="drag-handle drag-handle-left" data-side="left"></div>' +
      '<span class="task-bar-label">'+task.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>' +
      '<div class="drag-handle drag-handle-right" data-side="right"></div>';
    bar.addEventListener('click', ev => { if (!ev.target.classList.contains('drag-handle')) selectTask(task.id); });
    bar.addEventListener('mouseenter', ev => showTooltip(ev, task));
    bar.addEventListener('mouseleave', hideTooltip);
    bar.addEventListener('mousedown', ev => { if (!ev.target.classList.contains('drag-handle')) startDrag(ev, task, 'move'); });
    bar.querySelectorAll('.drag-handle').forEach(h => h.addEventListener('mousedown', ev => { ev.stopPropagation(); startDrag(ev, task, h.dataset.side); }));
    container.appendChild(bar);
  });
}

// ===== DRAG =====
function startDrag(e, task, mode) {
  e.preventDefault();
  const startX = e.clientX;
  const oS = new Date(task.start+'T00:00:00');
  const oE = new Date(task.end  +'T00:00:00');
  const onMove = ev => {
    const d = Math.round((ev.clientX-startX)/cellWidth);
    if (mode==='move') { task.start=toDateStr(new Date(oS.getTime()+d*86400000)); task.end=toDateStr(new Date(oE.getTime()+d*86400000)); }
    else if (mode==='left')  { const ns=new Date(oS.getTime()+d*86400000); if(ns<oE) task.start=toDateStr(ns); }
    else                     { const ne=new Date(oE.getTime()+d*86400000); if(ne>oS) task.end  =toDateStr(ne); }
    renderBars();
    if (selectedTaskId===task.id) updateDetailPanel(task);
  };
  const onUp = () => { saveState(); renderStats(); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ===== TOOLTIP =====
function showTooltip(e, task) {
  const tip = document.getElementById('tooltip');
  const dur = Math.floor((new Date(task.end)-new Date(task.start))/86400000)+1;
  tip.textContent = `${task.name} · ${formatDate(task.start)} → ${formatDate(task.end)} · ${dur}d · ${task.progress}%`;
  tip.style.left = (e.clientX+12)+'px'; tip.style.top = (e.clientY-32)+'px';
  tip.classList.add('visible');
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

// ===== TASK SELECTION =====
function selectTask(id) {
  selectedTaskId = id;
  const task = getTasks().find(t => t.id===id);
  if (!task) return;
  document.querySelectorAll('.task-row').forEach(r => r.classList.remove('selected'));
  document.querySelectorAll('.task-bar').forEach(b => b.classList.remove('selected'));
  document.getElementById('taskrow-'+id)?.classList.add('selected');
  document.getElementById('bar-'+id)?.classList.add('selected');
  updateDetailPanel(task);
  document.getElementById('detailPanel').classList.add('open');
}

function selectTaskList(id) {
  selectedTaskId = id;
  const task = getTasks().find(t => t.id===id);
  if (task) { updateDetailPanel(task); document.getElementById('detailPanel').classList.add('open'); }
}

function updateDetailPanel(task) {
  document.getElementById('detailName').value = task.name;
  document.getElementById('detailStart').value = task.start;
  document.getElementById('detailEnd').value = task.end;
  document.getElementById('detailProgress').value = task.progress;
  document.getElementById('progressLabel').textContent = task.progress+'%';
  document.getElementById('detailNotes').value = task.notes||'';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color===task.color));
}

function updateSelectedTask() {
  if (!selectedTaskId) return;
  const task = getTasks().find(t => t.id===selectedTaskId);
  if (!task) return;
  task.name  = document.getElementById('detailName').value;
  task.start = document.getElementById('detailStart').value;
  task.end   = document.getElementById('detailEnd').value;
  task.notes = document.getElementById('detailNotes').value;
  saveState(); render();
}

function updateProgress(val) {
  document.getElementById('progressLabel').textContent = val+'%';
  if (!selectedTaskId) return;
  const task = getTasks().find(t => t.id===selectedTaskId);
  if (task) { task.progress=parseInt(val); saveState(); renderBars(); renderStats(); renderList(); }
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedTaskId = null;
  document.querySelectorAll('.task-row').forEach(r => r.classList.remove('selected'));
  document.querySelectorAll('.task-bar').forEach(b => b.classList.remove('selected'));
}

function deleteSelectedTask() { if (selectedTaskId) { deleteTask(selectedTaskId); closeDetail(); } }

function deleteTask(id) {
  const proj = getActiveProject();
  proj.tasks = proj.tasks.filter(t => t.id!==id);
  saveState(); render();
}

function renameTask(id, name) {
  const task = getTasks().find(t => t.id===id);
  if (task) { task.name=name.trim(); saveState(); renderBars(); renderStats(); }
}

// ===== ADD TASK =====
function openAddModal() {
  const today = new Date(); const end = new Date(today); end.setDate(today.getDate()+7);
  document.getElementById('newTaskName').value = '';
  document.getElementById('newTaskStart').value = toDateStr(today);
  document.getElementById('newTaskEnd').value = toDateStr(end);
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('newTaskName').focus(), 80);
}

function addTask() {
  const proj = getActiveProject();
  const name  = document.getElementById('newTaskName').value.trim()||'New Task';
  const start = document.getElementById('newTaskStart').value;
  const end   = document.getElementById('newTaskEnd').value;
  proj.tasks.push({id:uid(), name, start, end, color:COLORS[proj.tasks.length%COLORS.length].bg, progress:0, notes:''});
  saveState(); closeModal('addModal'); render();
}

// ===== COLOR PICKER =====
function setupColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
    `<div class="color-swatch" data-color="${c.bg}" style="background:${c.bg}" onclick="setTaskColor('${c.bg}')" title="${c.name}"></div>`
  ).join('');
}

function setTaskColor(color) {
  if (!selectedTaskId) return;
  const task = getTasks().find(t => t.id===selectedTaskId);
  if (task) {
    task.color=color; saveState(); render();
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color===color));
  }
}

// ===== LIST VIEW =====
function renderList() {
  const tasks = getTasks();
  const body = document.getElementById('listBody');
  if (!tasks.length) { body.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><h3>No tasks yet</h3><p>Add your first task.</p></div>`; return; }
  body.innerHTML = tasks.map(task => {
    const dur = Math.floor((new Date(task.end)-new Date(task.start))/86400000)+1;
    const status = task.progress===100?'Done':task.progress>0?'In Progress':'Not Started';
    const sc = task.progress===100?'#4a7c6b':task.progress>0?'#c85c2a':'#8a8278';
    const sb = task.progress===100?'#ddf0ea':task.progress>0?'#f5e6dc':'#f0ece4';
    return `<div class="list-task-row" onclick="selectTaskList('${task.id}')">
      <div class="list-task-name"><div class="task-color-dot" style="background:${task.color}"></div>${escHtml(task.name)}</div>
      <div class="list-task-date">${formatDate(task.start)}</div>
      <div class="list-task-date">${formatDate(task.end)} <span style="color:var(--text-muted);font-size:10px">(${dur}d)</span></div>
      <div class="list-task-progress"><div class="list-progress-bar"><div class="list-progress-fill" style="width:${task.progress}%;background:${task.color}"></div></div><span style="font-size:11px;color:var(--text-muted)">${task.progress}%</span></div>
      <div><span class="status-badge" style="color:${sc};background:${sb}">${status}</span></div>
    </div>`;
  }).join('');
}

// ===== VIEW SWITCHING =====
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ganttWrapper').classList.toggle('list-hidden', view==='list');
  document.getElementById('listView').classList.toggle('active', view==='list');
  if (view==='list') renderList(); else renderGantt();
}

// ===== ZOOM & SCROLL =====
function changeZoom(delta) { cellWidth=Math.max(8,Math.min(60,cellWidth+delta)); renderTimeline(); renderBars(); }

function scrollToToday() {
  const today=new Date(); today.setHours(0,0,0,0);
  const offset=Math.floor((today-viewStartDate)/86400000);
  const gr=document.getElementById('ganttRight');
  gr.scrollTo({left:Math.max(0,offset*cellWidth-gr.clientWidth/2), behavior:'smooth'});
}

// ===== EXPORT =====
function exportData() {
  const proj = getActiveProject();
  const blob = new Blob([JSON.stringify({project:proj.name, exported:new Date().toISOString(), tasks:proj.tasks},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=proj.name.replace(/\s+/g,'-').toLowerCase()+'.json'; a.click();
}

// ===== MODAL =====
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ===== UTILS =====
function uid() { return Math.random().toString(36).substr(2,9); }
function toDateStr(d) { return d.toISOString().split('T')[0]; }
function formatDate(str) { return new Date(str+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeDetail(); closeModal('addModal'); closeModal('newProjectModal'); closeModal('confirmModal'); }
  if (e.key==='n' && !e.target.matches('input,textarea,[contenteditable]')) openAddModal();
  if (e.key==='Delete' && selectedTaskId && !e.target.matches('input,textarea,[contenteditable]')) deleteSelectedTask();
});

['addModal','newProjectModal','confirmModal'].forEach(id =>
  document.getElementById(id).addEventListener('click', function(e) { if(e.target===this) closeModal(id); })
);

document.getElementById('newTaskName').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
document.getElementById('newProjectName').addEventListener('keydown', e => { if(e.key==='Enter') createProject(); });

init();
</script>
</body>
</html>
